name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --name uidgen uidgen_gui.py --hidden-import uidlib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uidgen-windows
          path: dist/uidgen.exe
